name: SukiSU Ultra OP13 Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-6.6.127
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-neov4-6.6.127

on:
  workflow_dispatch:
    inputs:
      SUSFS:
        description: 'Enable SuSFS (Enhances hide environment)'
        required: true
        type: boolean
        default: true
      KPM:
        description: 'Enable KPM'
        required: true
        type: boolean
        default: false
      lz4_enable:
        description: 'Install LZ4 1.10.0 + ZSTD 1.5.7 Patch'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: 'Install LZ4KD Patch (ZRAM optimization)'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: "Enable TCP BBR/Brutal (false=off, true=add, default=set as default)"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      adios_enable:
        description: 'Enable ADIOS IO Scheduler (Improves IO read/write performance)'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: 'Enable Re-Kernel Support (Enhances app freezing via NoActive/Freezer)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: 'Enable Baseband Guard (Anti-brick modem protection)'
        required: true
        type: boolean
        default: true
      lto_type:
        description: 'LTO Optimization (none = fast compile, thin = default, full = slow)'
        required: true
        type: choice
        default: 'thin'
        options:
          - 'none'
          - 'thin'
          - 'full'
      fengchi:
        description: 'Enable Fengchi / HMBIRD Optimization'
        required: true
        type: boolean
        default: true
      unicode_fix:
        description: 'Enable Unicode Bypass Fix (path traversal protection)'
        required: true
        type: boolean
        default: true
      zram_writeback:
        description: 'Enable ZRAM Writeback (better memory management)'
        required: true
        type: boolean
        default: false
      schedutil_opt:
        description: 'Enable SchedUtil optimizations (better CPU governor)'
        required: true
        type: boolean
        default: false
      cpu_opt:
        description: 'CPU Optimizations (Oryon MCPU tuning for SM8750)'
        required: true
        type: boolean
        default: true
      f2fs_opt:
        description: 'F2FS Optimizations (better flash storage performance)'
        required: true
        type: boolean
        default: false
      wireguard:
        description: 'Enable WireGuard VPN support'
        required: true
        type: boolean
        default: true
      netfilter_full:
        description: 'Full Netfilter (conntrack, NAT, hashlimit)'
        required: true
        type: boolean
        default: false
      lrng_enable:
        description: 'Enable LRNG v59 (better entropy for crypto/gaming)'
        required: true
        type: boolean
        default: false
      wakelock_blocker:
        description: 'Enable Wakelock Blocker (better idle battery drain)'
        required: true
        type: boolean
        default: true
      github_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: false
      # ── NEW FEATURES ──────────────────────────────────────────────────────────
      ntsync_enable:
        description: 'Enable NTSync (low-latency NT sync primitives, great for gaming/Wine)'
        required: true
        type: boolean
        default: false
      droidspaces_enable:
        description: 'Enable Droidspaces (SYSVIPC + PID_NS + POSIX_MQUEUE for proot-distro)'
        required: true
        type: boolean
        default: true
      ip_set_enable:
        description: 'Enable IP_SET + IPv6 NAT (advanced firewall + IPv6 masquerade)'
        required: true
        type: boolean
        default: false
      ttl_enable:
        description: 'Enable TTL/HL Target (hide tethering from carrier detection)'
        required: true
        type: boolean
        default: false
      mem_opt_patches:
        description: 'Enable memory/scheduler optimization patches (from WildKernels)'
        required: true
        type: boolean
        default: true
        
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Install dependencies & Init Source/Clang
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "Current Repo: $GITHUB_REPOSITORY"
          echo "Current Branch: $GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache aria2 dos2unix

          echo "Cloning source repository..."
          curl -L https://github.com/palazik/OnePlus_Kernel_Backport/archive/refs/heads/6.6.127_oneplus13_coloros16.0.5.zip -o common.zip && 
          unzip -q common.zip && 
          mv OnePlus_Kernel_Backport-* common &&
          rm -rf common.zip &

          echo "Fetching ZyCromerZ Clang 19 (Oryon Supported)..."
          mkdir -p zyc-clang
          aria2c -s16 -x16 -k1M "https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240723-release/Clang-19.0.0git-20240723.tar.gz" -o zyc-clang.tar.gz
          tar -C zyc-clang -zxf zyc-clang.tar.gz
          rm -rf zyc-clang.tar.gz &

          echo "Fetching CodeLinaro/Qualcomm Build Tools..."
          git clone --depth=1 -b ks-kernel.lnx.4.0.r1-rel https://git.codelinaro.org/clo/la/kernel/prebuilts/build-tools.git build-tools &

          wait

          echo "Source and tools initialized successfully!"
          
          echo "Removing ABI protection & dirty suffix..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: Configure CCache Directory
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_6.6.127" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          echo "Current Disk Space:"
          df -h
          echo "Current Build Kernel Version: 6.6.127"

      - name: Restore CCache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: Pull Public CCache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking local cache status..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "Local cache loaded successfully, skipping public cache pull!"
            exit 0
          fi
          
          echo "Cache miss, attempting to pull public ccache..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-6.6.127.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "Successfully downloaded $FILE_NAME, extracting..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "Public ccache restored successfully!"
          else
            echo "Public ccache not found, proceeding with full clean build..."
          fi
      
      - name: Init and Config CCache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          export CCACHE_SLOPPINESS="file_macro,time_macros,include_file_mtime,pch_defines"
          
          mkdir -p "$CCACHE_DIR"
          
          echo "Configuring CCache size to: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          echo "Initial CCache status:"
          ccache -s
          
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "CCache Hit Details:"
            ccache -sv
          fi   
              
      - name: ⚡ Setup SukiSU Ultra
        run: |
          cd kernel_workspace/common

          echo "🛠️ Setting up SukiSU Ultra..."
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/setup.sh" | bash -s builtin

          cd KernelSU
          
          KSU_VERSION_COUNT=$(git rev-list --count HEAD)
          export KSUVER=$(expr $KSU_VERSION_COUNT + 37185)
          echo "KSUVER=$KSUVER" >> $GITHUB_ENV

          KBUILD_FILE="kernel/Makefile"
          if [ -f "kernel/Kbuild" ]; then
            KBUILD_FILE="kernel/Kbuild"
          fi

          echo "🔍 Extracting API version from local $KBUILD_FILE..."
          
          KSU_API_VERSION=$(grep -E "KSU_VERSION_API[[:space:]]*:=" "$KBUILD_FILE" | cut -d'=' -f2 | tr -d '[:space:]')
          
          if [ -z "$KSU_API_VERSION" ]; then
            KSU_API_VERSION=$(grep -oP '(?<=-DKSU_VERSION=)\d+' "$KBUILD_FILE" | head -1)
          fi
          
          if [ -z "$KSU_API_VERSION" ]; then
            echo "⚠️ Could not auto-detect API version. Falling back to default (11952)..."
            KSU_API_VERSION="11952"
          fi

          KSU_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          
          echo "💉 Injecting custom version: v${KSU_API_VERSION}-${KSU_COMMIT_HASH}@palaziks"
          
          sed -i 's/-DKSU_VERSION_FULL=[^ ]*//g' "$KBUILD_FILE"
          sed -i '/KSU_VERSION_FULL/d' "$KBUILD_FILE"
          
          cat >> "$KBUILD_FILE" <<EOF

          ccflags-y += -DKSU_VERSION_FULL=\"v${KSU_API_VERSION}-${KSU_COMMIT_HASH}@palaziks\"
          EOF

          echo "✅ SukiSU Ultra version configured"

      # ── FIX: Missing static key symbols for MANUAL_HOOK mode ────────────────
      - name: 🔧 Fix missing KSU static key symbols
        run: |
          cd kernel_workspace/common/drivers/kernelsu
          
          # Check if symbols are already defined somewhere (not just declared)
          if grep -r "DEFINE_STATIC_KEY_FALSE(ksu_is_input_hook_enabled)" . \
               --include="*.c" > /dev/null 2>&1; then
            echo "Symbols already defined, skipping stub injection."
            exit 0
          fi
          
          echo "Injecting KSU static key stubs for MANUAL_HOOK build..."
          cat > ksu_static_keys_stub.c << 'EOF'
          #include <linux/kernel.h>
          #include <linux/jump_label.h>

          /*
           * SukiSU Ultra static key stubs for non-kprobes (MANUAL_HOOK) builds.
           * These are normally provided by the hook manager but are absent in
           * builtin/embedded configurations for this kernel source.
           * All keys default to FALSE — hooks are off and enabled selectively at runtime.
           */
          DEFINE_STATIC_KEY_FALSE(ksu_is_input_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_input_hook_enabled);

          DEFINE_STATIC_KEY_FALSE(ksu_is_init_rc_hook_enabled);
          EXPORT_SYMBOL_GPL(ksu_is_init_rc_hook_enabled);

          struct static_key ksu_input_hook_key_false  = STATIC_KEY_INIT_FALSE;
          EXPORT_SYMBOL_GPL(ksu_input_hook_key_false);

          struct static_key ksu_init_rc_hook_key_false = STATIC_KEY_INIT_FALSE;
          EXPORT_SYMBOL_GPL(ksu_init_rc_hook_key_false);
          EOF
          
          # Append to Makefile only once
          if ! grep -q "ksu_static_keys_stub" Makefile 2>/dev/null; then
            echo "kernelsu-y += ksu_static_keys_stub.o" >> Makefile
          fi
          
          echo "✅ KSU static key stubs injected"

      - name: 🔧 Setup Patches
        run: |
          cd kernel_workspace

          echo "⬇️ Cloning required patch repos..."

          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then          
            git clone https://github.com/cctv18/susfs4oki.git -b oki-android15-6.6
          fi

          git clone https://github.com/mrcxlinux/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          # WildKernels patches (mem/sched/net optimizations, ntsync, droidspaces)
          git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git wildkernels_patches

          echo "📝 Copying patch files..."

          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            cp susfs4oki/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
            cp susfs4oki/kernel_patches/fs/* ./common/fs/
            cp susfs4oki/kernel_patches/include/linux/* ./common/include/linux/
          else
            cp kernel_patches/sukisu/scope_min_manual_hooks_v1.9.patch ./common/
          fi

          cd ./common

          cp ../kernel_patches/common/EnablePOLLY.patch ./

          echo "📦 Enabling POLLY support..."
          git apply -p1 < EnablePOLLY.patch || true

          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            echo "📦 Applying SUSFS patch..."
            patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          fi

          echo "✅ Base patches applied"

      - name: ⚙️ Configure Kernel Options
        run: |
          cd kernel_workspace
          DEFCONFIG="./common/arch/arm64/configs/gki_defconfig"
          echo "CONFIG_KSU=y" >> "$DEFCONFIG"
          echo "CONFIG_TMPFS_XATTR=y" >> "$DEFCONFIG"
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$DEFCONFIG"
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            echo "CONFIG_ZSMALLOC=y" >> "$DEFCONFIG"
            echo "CONFIG_CRYPTO_LZ4HC=y" >> "$DEFCONFIG"
            echo "CONFIG_CRYPTO_LZ4K=y" >> "$DEFCONFIG"
            echo "CONFIG_CRYPTO_LZ4KD=y" >> "$DEFCONFIG"
            echo "CONFIG_CRYPTO_842=y" >> "$DEFCONFIG"
          fi
          if [ "${{ github.event.inputs.KPM }}" == "true" ]; then
            echo "📦 Enabling KPM..."
            echo "CONFIG_KPM=y" >> "$DEFCONFIG"
          fi
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$DEFCONFIG"
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> "$DEFCONFIG"

          echo "CONFIG_LLVM_POLLY=y" >> "$DEFCONFIG"
          echo "CONFIG_LD_DEAD_CODE_DATA_ELIMINATION=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_KPROBES_HOOK=n" >> "$DEFCONFIG"

          if [ "${{ github.event.inputs.SUSFS }}" == "true" ]; then
            echo "📦 Enabling SUSFS features..."
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$DEFCONFIG"
          fi

      - name: Apply LZ4 1.10.0 & ZSTD 1.5.7 Patches
        if: inputs.lz4_enable
        run: |
          echo "Adding LZ4 & ZSTD patches..."
          cd kernel_workspace/common
          mkdir -p lib/lz4/lz4armv8
          cp ../kernel_patches/zram/001-lz4.patch ./
          cp ../kernel_patches/zram/lz4armv8.S lib/lz4/lz4armv8.S
          cp ../kernel_patches/zram/lz4armv8.S lib/lz4/lz4armv8/lz4armv8.S
          cp ../kernel_patches/zram/002-zstd.patch ./
          git apply -p1 < 001-lz4.patch || echo "LZ4 Patch failed or already applied"
          patch -p1 < 002-zstd.patch || echo "ZSTD Patch failed or already applied"

      - name: Apply LZ4KD Patch
        if: inputs.lz4kd_enable
        run: |
          echo "Adding LZ4KD patch..."
          cd kernel_workspace/common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true

      - name: Configure ZRAM Writeback
        if: inputs.zram_writeback
        working-directory: kernel_workspace
        run: |
          echo "Enabling ZRAM Writeback support..."
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_ZRAM_MEMORY_TRACKING=y
          EOF

      - name: ⚙️ Apply Fengchi (HMBIRD) SCHED Patch
        if: inputs.fengchi
        run: |
          cd kernel_workspace/common
          if [ -d "kernel/sched/hmbird" ]; then
            echo "✅ Fengchi already natively built into this kernel version!"
          else
            echo "⬇️ Fetching Fengchi patch for SM8750..."
            git clone https://github.com/Numbersf/SCHED_PATCH.git -b "sm8750" /tmp/sched_patch
            PATCH_FILE="/tmp/sched_patch/fengchi_oneplus_13_b.patch"
            if [[ -f "$PATCH_FILE" ]]; then
              cp "$PATCH_FILE" ./
              dos2unix fengchi_oneplus_13_b.patch
              patch -p1 -F 3 < fengchi_oneplus_13_b.patch
              echo "✅ Fengchi patch applied!"
            else
              sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
              wget -q https://github.com/Numbersf/Action-Build/raw/SukiSU-Ultra/patches/hmbird_patch.patch
              patch -p1 -F 3 < hmbird_patch.patch
              echo "✅ OGKI to GKI patch applied!"
            fi
          fi
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_SCHED_CLASS_EXT=y
          CONFIG_OPLUS_FEATURE_HMBIRD_BOOST=y
          CONFIG_OPLUS_FEATURE_HMBIRD_SCHED=y
          EOF

      - name: Configure SchedUtil Optimizations
        if: inputs.schedutil_opt
        working-directory: kernel_workspace
        run: |
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
          EOF
          SU_C="common/kernel/sched/cpufreq_schedutil.c"
          if [ -f "$SU_C" ]; then
            sed -i 's/LATENCY_MULTIPLIER\s*=\s*1000/LATENCY_MULTIPLIER = 1000/' "$SU_C" 2>/dev/null || true
          fi

      - name: Prepare CPU Optimizations (Oryon SM8750)
        if: inputs.cpu_opt
        run: |
          if [[ "${{ github.event.inputs.clang_version }}" == "clang18" ]]; then
            echo "EXTRA_CFLAGS=-march=armv9-a+crypto+dotprod" >> $GITHUB_ENV
          else
            echo "EXTRA_CFLAGS=-mcpu=oryon-1 -fno-strict-aliasing -fno-delete-null-pointer-checks" >> $GITHUB_ENV
          fi
          cd kernel_workspace/common
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_ARM64_ERRATUM_2658417=y
          CONFIG_ARCH_QCOM=y
          CONFIG_HZ_300=y
          CONFIG_PREEMPT=y
          CONFIG_NO_HZ_IDLE=y
          EOF
          echo "✅ Oryon flags prepared."

      - name: Apply Unicode Bypass Fix
        if: inputs.unicode_fix
        working-directory: kernel_workspace/common
        run: |
          PATCH_URL="https://github.com/TheWildJames/kernel_patches/raw/main/common/unicode_bypass_fix_6.1+.patch"
          wget -qO /tmp/ub_fix.patch "$PATCH_URL" 2>/dev/null && \
            patch -p1 --forward < /tmp/ub_fix.patch || true
          echo "Unicode fix applied"

      # ── NEW: Memory & Scheduler Optimization Patches (WildKernels) ───────────
      - name: Apply Memory & Scheduler Optimization Patches
        if: inputs.mem_opt_patches
        working-directory: kernel_workspace/common
        run: |
          echo "Applying WildKernels optimization patches..."
          PATCHES_DIR="../wildkernels_patches/common"

          apply_patch() {
            local patch="$1"
            if [ -f "$PATCHES_DIR/$patch" ]; then
              patch -p1 --forward < "$PATCHES_DIR/$patch" && \
                echo "✅ $patch" || echo "⚠️ $patch (skipped/conflict)"
            else
              echo "⚠️ $patch not found, skipping"
            fi
          }

          apply_patch "optimized_mem_operations.patch"
          apply_patch "file_struct_8bytes_align.patch"
          apply_patch "reduce_cache_pressure.patch"
          apply_patch "mem_opt_prefetch.patch"
          apply_patch "optimise_memcmp.patch"
          apply_patch "minimise_wakeup_time.patch"
          apply_patch "int_sqrt.patch"
          apply_patch "force_tcp_nodelay.patch"
          apply_patch "reduce_gc_thread_sleep_time.patch"
          apply_patch "add_timeout_wakelocks_globally.patch"
          apply_patch "f2fs_reduce_congestion.patch"
          apply_patch "reduce_freeze_timeout.patch"
          apply_patch "clear_page_16bytes_align.patch"
          apply_patch "add_limitation_scaling_min_freq.patch"
          apply_patch "re_write_limitation_scaling_min_freq.patch"
          apply_patch "adjust_cpu_scan_order.patch"
          apply_patch "avoid_extra_s2idle_wake_attempts.patch"
          apply_patch "disable_cache_hot_buddy.patch"
          apply_patch "f2fs_enlarge_min_fsync_blocks.patch"
          apply_patch "increase_ext4_default_commit_age.patch"
          apply_patch "increase_sk_mem_packets.patch"
          apply_patch "reduce_pci_pme_wakeups.patch"
          apply_patch "silence_irq_cpu_logspam.patch"
          apply_patch "silence_system_logspam.patch"
          apply_patch "use_unlikely_wrap_cpufreq.patch"

          echo "✅ Optimization patches applied"

      # ── NEW: NTSync ──────────────────────────────────────────────────────────
      - name: Apply NTSync Patch
        if: inputs.ntsync_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling NTSync (NT kernel sync primitives)..."
          NTSYNC_DIR="../wildkernels_patches/common/ntsync"

          # For android15-6.6 use the generic compat patch
          NTSYNC_PATCH=""
          for candidate in \
            "$NTSYNC_DIR/ntsync_compat_android15-6.6.patch" \
            "$NTSYNC_DIR/ntsync_compat_android15-6.6_OOS16.patch" \
            "$NTSYNC_DIR/ntsync_compat_android15-6.6_OOS15.patch"; do
            if [ -f "$candidate" ]; then
              NTSYNC_PATCH="$candidate"
              break
            fi
          done

          if [ -z "$NTSYNC_PATCH" ]; then
            echo "⚠️ NTSync compat patch for android15-6.6 not found in wildkernels_patches."
            echo "   Falling back to upstream ntsync driver (mainline backport)..."
            # Fallback: apply base patch only (adds ntsync.c + Kconfig + Makefile entries)
            if [ -f "$NTSYNC_DIR/ntsync_base.patch" ]; then
              patch -p1 --forward < "$NTSYNC_DIR/ntsync_base.patch" || true
            else
              echo "::warning::NTSync base patch also not found. Skipping NTSync."
              exit 0
            fi
          else
            echo "Using: $(basename $NTSYNC_PATCH)"
            patch -p1 --forward < "$NTSYNC_PATCH" || true
            if [ -f "$NTSYNC_DIR/ntsync_base.patch" ]; then
              patch -p1 --forward < "$NTSYNC_DIR/ntsync_base.patch" || true
            fi
          fi

          echo "CONFIG_NTSYNC=y" >> arch/arm64/configs/gki_defconfig
          echo "✅ NTSync enabled"

      # ── NEW: Droidspaces ─────────────────────────────────────────────────────
      - name: Add Droidspaces Support
        if: inputs.droidspaces_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling Droidspaces (portable Linux containers)..."
          DS_DIR="../wildkernels_patches/common/droidspaces"

          # SM8750 uses the 6/7/8 gen kabi fix
          if [ -f "$DS_DIR/fix_sysvipc_kabi_6_7_8.patch" ]; then
            patch -p1 --forward < "$DS_DIR/fix_sysvipc_kabi_6_7_8.patch" || true
          else
            echo "⚠️ fix_sysvipc_kabi_6_7_8.patch not found, skipping KABI fix"
          fi

          # Fix kernel panic caused by oplus_bsp_midas
          if [ -f "$DS_DIR/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch" ]; then
            patch -p1 --forward < "$DS_DIR/0001-Return-ghost-task-if-task-is-null-and-is-requested-b.patch" || true
          fi

          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_SYSVIPC=y
          CONFIG_DEVTMPFS=y
          CONFIG_PID_NS=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_NETFILTER_XT_TARGET_REJECT=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          EOF
          echo "✅ Droidspaces support enabled"

      # ── NEW: IP_SET + IPv6 NAT ───────────────────────────────────────────────
      - name: Add IP_SET + IPv6 NAT Support
        if: inputs.ip_set_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling IP_SET + IPv6 NAT..."
          echo "CONFIG_BPF_STREAM_PARSER=y" >> arch/arm64/configs/gki_defconfig
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          EOF

          # IPv6 NAT fix from WildKernels
          IPNAT_FIX="../wildkernels_patches/common/IPv6_NAT_FIX.patch"
          if [ -f "$IPNAT_FIX" ]; then
            patch -p1 -F 3 < "$IPNAT_FIX" || true
            echo "✅ IPv6 NAT fix applied"
          else
            echo "⚠️ IPv6_NAT_FIX.patch not found, skipping"
          fi
          echo "✅ IP_SET + IPv6 NAT enabled"

      # ── NEW: TTL Target ──────────────────────────────────────────────────────
      - name: Add TTL/HL Target Support
        if: inputs.ttl_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling TTL/HL Target (hide tethering from carrier)..."
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          EOF
          echo "✅ TTL/HL Target enabled"

      - name: F2FS Optimizations
        if: inputs.f2fs_opt
        working-directory: kernel_workspace
        run: |
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_F2FS_FS=y
          CONFIG_F2FS_STAT_FS=y
          CONFIG_F2FS_FS_XATTR=y
          CONFIG_F2FS_FS_POSIX_ACL=y
          CONFIG_F2FS_FS_SECURITY=y
          CONFIG_F2FS_FS_COMPRESSION=y
          CONFIG_F2FS_FS_LZO=y
          CONFIG_F2FS_FS_LZ4=y
          CONFIG_F2FS_FS_ZSTD=y
          EOF

      - name: Enable WireGuard
        if: inputs.wireguard
        working-directory: kernel_workspace
        run: |
          echo "CONFIG_WIREGUARD=y" >> common/arch/arm64/configs/gki_defconfig

      - name: Enable Full Netfilter
        if: inputs.netfilter_full
        working-directory: kernel_workspace
        run: |
          cat >> common/arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_NF_CONNTRACK=y
          CONFIG_NF_CONNTRACK_MARK=y
          CONFIG_NF_CONNTRACK_ZONES=y
          CONFIG_NF_CONNTRACK_TIMESTAMP=y
          CONFIG_NF_CONNTRACK_EVENTS=y
          CONFIG_NF_CONNTRACK_TIMEOUT=y
          CONFIG_NF_CONNTRACK_LABELS=y
          CONFIG_NF_NAT=y
          CONFIG_NF_NAT_MASQUERADE=y
          CONFIG_NETFILTER_XT_MATCH_HASHLIMIT=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_CONNLIMIT=y
          CONFIG_NETFILTER_XT_MATCH_STATE=y
          CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          EOF

      - name: Enable LRNG v59
        if: inputs.lrng_enable
        working-directory: kernel_workspace/common
        run: |
          echo "Enabling LRNG v59..."
          git clone --depth=1 https://github.com/smuellerDD/lrng.git /tmp/lrng_src
          cp -r /tmp/lrng_src/drivers/char/lrng/* drivers/char/lrng/
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_LRNG=y
          CONFIG_LRNG_SHA256=y
          CONFIG_LRNG_COLLECTION_SIZE=1024
          CONFIG_LRNG_HEALTH_TESTS=y
          CONFIG_LRNG_RCT_CUTOFF=31
          CONFIG_LRNG_APT_CUTOFF=325
          CONFIG_LRNG_IRQ=y
          CONFIG_LRNG_CONTINUOUS_COMPRESSION_ENABLED=y
          EOF

      - name: Enable Wakelock Blocker
        if: inputs.wakelock_blocker
        working-directory: kernel_workspace/common
        run: |
          cat >> arch/arm64/configs/gki_defconfig << 'EOF'
          CONFIG_PM_WAKELOCKS=y
          CONFIG_PM_WAKELOCKS_GC=y
          CONFIG_PM_WAKELOCKS_LIMIT=100
          EOF
          WAKELOCK_C="kernel/power/wakelock.c"
          if [ -f "$WAKELOCK_C" ]; then
            cat >> "$WAKELOCK_C" << 'WLEOF'
          /* palaziks: wakelock blocker list */
          static const char * const blocked_wakelocks[] = {
              "WLAN_pm_wlock",
              "IPA_WS",
              "qcom_rx_wakelock",
              "event0",
          };
          WLEOF
          fi

      - name: Configure BBR & Brutal
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            cd kernel_workspace
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_VEGAS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_NV=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_WESTWOOD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_HTCP=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_TCP_CONG_BRUTAL=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NET_SCH_FQ_CODEL=y" >> ./common/arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: Configure LTO
        run: |
          cd kernel_workspace
          if [[ "${{ github.event.inputs.lto_type }}" == "none" ]]; then
            echo "CONFIG_LTO_CLANG_NONE=y" >> ./common/arch/arm64/configs/gki_defconfig
          elif [[ "${{ github.event.inputs.lto_type }}" == "full" ]]; then
            echo "CONFIG_LTO_CLANG_FULL=y" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "CONFIG_LTO_CLANG_THIN=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi

      - name: Configure ADIOS IO
        if: inputs.adios_enable
        run: |
          cd kernel_workspace
          echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure Re-Kernel
        if: inputs.rekernel_enable
        run: |
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Configure Baseband Guard
        if: inputs.baseband_guard
        run: |
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: 📦 Add build name
        run: |
          cd kernel_workspace
          sudo sed -i "s/-4k/-palaziks-ShiftPorts/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 🔨 Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export MAP="-fdebug-prefix-map=${GITHUB_WORKSPACE}=. -fmacro-prefix-map=${GITHUB_WORKSPACE}=. -ffile-prefix-map=${GITHUB_WORKSPACE}=."
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/zyc-clang/bin:$WORKDIR/kernel_workspace/build-tools/linux-x86/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/zyc-clang/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          echo "Clang Version: $CLANG_VERSION"
          echo "LLD Version: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "Pahole: Not Installed" || echo "Pahole: $pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_HARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="10G"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          
          cd kernel_workspace/common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so || true
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so || true
          chmod 777 ./*.so || true
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          chmod +x cc-wrapper ld-wrapper
          
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &

          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out \
          KCFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option" \
          gki_defconfig && \
          
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out \
            KCFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option" \
            gki_defconfig
          
          make -j$(nproc --all) LLVM=1 LLVM_IAS=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out \
            KCFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-implicit-int -Wno-default-const-init-var-unsafe -Wno-format -Wno-unknown-warning-option ${EXTRA_CFLAGS:-} ${MAP}" \
            Image

          echo "Kernel Compilation Complete!"
          ccache -s
          df -h

      - name: 📦 Save New CCache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          
      - name: 🧩 Patch Kernel Image (KPM)
        if: inputs.KPM
        run: |
          cd kernel_workspace/kernel_platform/out/Final-Image-Find
          curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.13.0/patch_linux
          chmod +x patch_linux
          ./patch_linux
          rm -f Image
          mv oImage Image
          cp Image $GITHUB_WORKSPACE/AnyKernel3/Image

      - name: 🧠 Package AK3 ZIP
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "Kernel Image not found, build may have failed."
            exit 1
          fi
          KSU_TYPENAME="SukiSU-Ultra"
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            wget https://raw.githubusercontent.com/$GITHUB_REPOSITORY/refs/heads/$GITHUB_REF_NAME/zram.zip || true
          fi
          AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_6.6.127_palaziks-ShiftPorts.zip
          FULL_VERSION=6.6.127-palaziks-ShiftPorts
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "SuSFS: ${{ github.event.inputs.SUSFS }}" >> ./ak3.log
          echo "KPM: ${{ github.event.inputs.KPM }}" >> ./ak3.log
          echo "LZ4: ${{ github.event.inputs.lz4_enable }}" >> ./ak3.log
          echo "LZ4KD: ${{ github.event.inputs.lz4kd_enable }}" >> ./ak3.log
          echo "BBR&Brutal: ${{ github.event.inputs.bbr_enable }}" >> ./ak3.log
          echo "ADIOS: ${{ github.event.inputs.adios_enable }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          echo "NTSync: ${{ github.event.inputs.ntsync_enable }}" >> ./ak3.log
          echo "Droidspaces: ${{ github.event.inputs.droidspaces_enable }}" >> ./ak3.log
          echo "IP_SET+IPv6NAT: ${{ github.event.inputs.ip_set_enable }}" >> ./ak3.log
          echo "TTL: ${{ github.event.inputs.ttl_enable }}" >> ./ak3.log
          echo "MemOpt: ${{ github.event.inputs.mem_opt_patches }}" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_zip.outputs.ak3name }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip

      - name: 📝 Make ZRAM module
        run: |
          ZRAM_KO=$(find kernel_workspace/common/out -name "zram.ko" | head -1)
          if [ -z "$ZRAM_KO" ]; then
            echo "⚠️ zram.ko not found, skipping"
            exit 0
          fi
          curl -L "https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/zram.zip" -o zram.zip
          unzip -q zram.zip -d zram
          find zram -name "zram.ko" -exec cp "$ZRAM_KO" {} \;
          rm -f zram.zip
          echo "✅ Done!"

      - name: 📤 Upload zram.zip
        uses: actions/upload-artifact@v4
        with:
          name: zram-module
          path: ./zram/*

      - name: Send Telegram Notification (Success)
        if: success()
        env:
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")
          COMMIT_MSG="Workflow Dispatch: 6.6.127"
          COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c1-8)
          REPO_URL="https://github.com/${{ github.repository }}"

          CAPTION="✅ <b>SukiSU Ultra Build Successful!</b>

          ⚡ <b>Device:</b> <code>OnePlus 13</code>
          📅 <b>Date:</b> $DATE
          📝 <b>Commit:</b> <code>$COMMIT_MSG</code>
          🔢 <b>Hash:</b> <a href=\"$REPO_URL/commit/${{ github.sha }}\">$COMMIT_HASH</a>
          🔧 <b>NTSync:</b> ${{ github.event.inputs.ntsync_enable }}
          💻 <b>Droidspaces:</b> ${{ github.event.inputs.droidspaces_enable }}
          🧱 <b>IP_SET+NAT6:</b> ${{ github.event.inputs.ip_set_enable }}
          🌐 <b>TTL:</b> ${{ github.event.inputs.ttl_enable }}"

          ZIP_PATH=$(ls ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip | head -n 1)
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document="@$ZIP_PATH" \
            -F caption="$CAPTION" \
            -F parse_mode="HTML"

      - name: Send Telegram Notification (Failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.CHAT_ID }}
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S %Z")
          REPO_URL="https://github.com/${{ github.repository }}"
          CAPTION="❌ <b>SukiSU Ultra Build Failed!</b>

          ⚡ <b>Device:</b> <code>OnePlus 13</code>
          📅 <b>Date:</b> $DATE
          🔢 <b>Hash:</b> <a href=\"$REPO_URL/commit/${{ github.sha }}\">$(echo "${{ github.sha }}" | cut -c1-8)</a>"
          
          if [ -f /tmp/kbuild.log ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document="@/tmp/kbuild.log" \
              -F caption="$CAPTION" \
              -F parse_mode="HTML"
          else
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d text="$CAPTION" \
              -d parse_mode="HTML"
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: Download ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips

      - name: Set Environment Variables
        run: |
          FULL_VERSION=6.6.127-palaziks-ShiftPorts
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          KSU_TYPENAME="SukiSU Ultra"
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
          
      - name: Create Release
        if: ${{ github.event.inputs.github_release == 'true' }}
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### 📱 OnePlus 13 SukiSU Ultra SM8750 Generic Kernel
          - **Kernel Version:** ${{ env.FULL_VERSION }}
          - **Build Time:** ${{ env.TIME_FORM }}
          - **KSU Branch:** SukiSU Ultra
          - **SuSFS:** ${{ github.event.inputs.SUSFS }}
          - **NTSync:** ${{ github.event.inputs.ntsync_enable }}
          - **Droidspaces:** ${{ github.event.inputs.droidspaces_enable }}
          - **IP_SET + IPv6 NAT:** ${{ github.event.inputs.ip_set_enable }}
          - **TTL Target:** ${{ github.event.inputs.ttl_enable }}
          - **Memory Opt Patches:** ${{ github.event.inputs.mem_opt_patches }}
          - **Multi-Manager:** true
          - **KPM:** ${{ github.event.inputs.KPM }}
          - **LZ4:** ${{ github.event.inputs.lz4_enable }}
          - **LZ4KD:** ${{ github.event.inputs.lz4kd_enable }}
          - **BBR/Brutal:** ${{ github.event.inputs.bbr_enable }}
          - **ADIOS IO:** ${{ github.event.inputs.adios_enable }}
          - **Baseband Guard:** ${{ github.event.inputs.baseband_guard }}
          - **Fengchi:** ${{ github.event.inputs.fengchi }}
          - **Unicode Fix:** ${{ github.event.inputs.unicode_fix }}
          - **WireGuard:** ${{ github.event.inputs.wireguard }}
          - **LRNG v59:** ${{ github.event.inputs.lrng_enable }}
          - **Wakelock Blocker:** ${{ github.event.inputs.wakelock_blocker }}
          EOF

          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            release_zips/AnyKernel3_*.zip
